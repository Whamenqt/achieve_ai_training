<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Achieve AI Training</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎓</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: { brand: { DEFAULT: '#4f46e5', dark: '#3730a3', light: '#eef2ff' } } } }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { background:#f8fafc; }
    .spin { border:3px solid #e2e8f0; border-top-color:#4f46e5; border-radius:50%; width:28px; height:28px; animation:sp 0.7s linear infinite; }
    @keyframes sp { to { transform:rotate(360deg); } }
    [x-cloak]{display:none}
  </style>
</head>
<body class="text-slate-800">
  <div id="app" class="min-h-screen">
    <div class="flex items-center justify-center h-screen"><div class="spin"></div></div>
  </div>
  <div id="toast" class="fixed bottom-4 right-4 z-50 space-y-2"></div>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
